#!/usr/bin/env docker compose -f
name: backstage
services:
  psql:
    image: postgres:17.9
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  redis:
    image: redis:8.2.1-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 1s
      timeout: 3s
      retries: 5
  opensearch:
    image: opensearchproject/opensearch:2.19.5
    environment:
      plugins.security.disabled: true
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Opensearch1!
    ports:
      - '9200:9200'
      - '9600:9600'
    healthcheck:
      test: 'curl --fail opensearch:9200/_cat/health >/dev/null || exit 1'
      interval: 5s
      timeout: 5s
      retries: 30
  ui:
    build: .
    environment:
      APP_BASE_URL: http://ui.backstage.orb.local
      BACKEND_BASE_URL: http://ui.backstage.orb.local
      POSTGRES_HOST: psql
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '7007:7007'
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
